receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  transform/add-collector-enabled:
    error_mode: ignore
    log_statements:
      - set(resource.attributes["collector.enabled"], "true")
    trace_statements:
      - set(resource.attributes["collector.enabled"], "true")
    metric_statements:
      - set(resource.attributes["collector.enabled"], "true")

exporters:
  debug:
    verbosity: detailed
  otlp/aspire:
    endpoint: ${env:ASPIRE_ENDPOINT}
    headers:
      x-otlp-api-key: ${env:ASPIRE_API_KEY}
    tls:
        insecure: true
  otlphttp/langsmith:
    endpoint: https://api.smith.langchain.com/otel
    headers:
      x-api-key: ${env:LANGSMITH_API_KEY}
      Langsmith-Project: dev-agent-leasing-otel
  
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [otlp/aspire, otlphttp/langsmith]
    metrics:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [otlp/aspire]
    logs:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [debug, otlp/aspire]
