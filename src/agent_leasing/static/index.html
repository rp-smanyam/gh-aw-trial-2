<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #adadad;
            padding: 0.3rem 1rem;
            min-height: 27px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: white;
            font-size: 1em;
            font-weight: bold;
        }

        .connect-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .connect-btn.disconnected {
            background: #0066cc;
            color: white;
        }

        .connect-btn.connected {
            background: #dc3545;
            color: white;
        }

        .connect-btn:hover {
            opacity: 0.9;
        }

        .main {
            flex: 1;
            display: flex;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 80px);
        }

        .messages-pane {
            flex: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-header {
            padding: 1rem;
            border-bottom: 1px solid #e1e5e9;
            font-weight: 600;
        }

        .messages-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #0066cc;
            color: white;
        }

        .message.assistant .message-bubble {
            background: #f1f3f4;
            color: #333;
        }

        .right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .events-pane {
            flex: 2;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tools-pane {
            flex: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .events-header, .tools-header {
            padding: 1rem;
            border-bottom: 1px solid #e1e5e9;
            font-weight: 600;
        }

        .events-content, .tools-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .event {
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .event-header {
            padding: 0.75rem;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .event-header:hover {
            background: #e9ecef;
        }

        .tools-content .event-header {
            cursor: default;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .tools-content .event-header.handoff {
            background: #f3e8ff;
            border-left: 4px solid #8b5cf6;
        }

        .tools-content .event-header.tool {
            background: #fef3e2;
            border-left: 4px solid #f59e0b;
        }

        .event-content {
            padding: 0.75rem;
            background: white;
            border-top: 1px solid #e1e5e9;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-content.collapsed {
            display: none;
        }

        .controls {
            padding: 1rem;
            border-top: 1px solid #e1e5e9;
            background: #f8f9fa;
            display: flex;
            gap: 0.5rem;
        }

        .mute-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mute-btn.unmuted {
            background: #28a745;
            color: white;
        }

        .mute-btn.muted {
            background: #dc3545;
            color: white;
        }

        .mute-btn.active {
            animation: pulse 1s infinite;
        }

        .text-input-container {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-top: 1px solid #e1e5e9;
            background: white;
        }

        .text-input {
            flex: 1;
            padding: 0.5rem 1rem;
            border: 1px solid #e1e5e9;
            border-radius: 20px;
            font-size: 0.9rem;
            outline: none;
        }

        .text-input:focus {
            border-color: #0066cc;
        }

        .text-input:disabled {
            background: #f8f9fa;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            background: #0066cc;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #0052a3;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .status {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .connected {
            color: #28a745;
        }

        .disconnected {
            color: #dc3545;
        }

        .agent-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .agent-selector label {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 500;
        }

        .agent-selector select {
            padding: 0.5rem;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .agent-selector select:focus {
            outline: none;
            border-color: #0066cc;
        }

        .nav-link {
            padding: 0.25rem 0.75rem;
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            background: white;
            border: 1px solid #0066cc;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #0066cc;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .json-pane {
            flex: 1;
            min-width: 0;
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .json-header {
            padding: 1rem;
            border-bottom: 1px solid #e1e5e9;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            padding: 0.25rem 0.75rem;
            border: 1px solid #e1e5e9;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .reset-btn:hover {
            background: #f1f3f4;
        }

        .json-content {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        .json-editor {
            flex: 1;
            width: 100%;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.75rem;
            resize: none;
            outline: none;
            background: #f8f9fa;
        }

        .json-editor:focus {
            border-color: #0066cc;
            background: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent Leasing Voice</h1>
        <div class="agent-selector">
            <label for="agentSelect">Agent:</label>
            <select id="agentSelect">
                <option value="resident_one_voice" selected>resident_one_voice</option>
                <option value="simple">simple</option>
            </select>
            <button id="connectBtn" class="connect-btn disconnected">Connect</button>
        </div>
        <div class="header-right">
            <a href="/chatbot" class="nav-link">Chatbot</a>
        </div>
    </div>

    <div class="main">
        <div class="messages-pane">
            <div class="messages-header">
                Conversation
            </div>
            <div id="messagesContent" class="messages-content">
                <!-- Messages will appear here -->
            </div>
            <div class="text-input-container">
                <input type="text" id="textInput" class="text-input" placeholder="Type a message..." disabled>
                <button id="sendBtn" class="send-btn" disabled>Send</button>
            </div>
            <div class="controls">
                <button id="muteBtn" class="mute-btn unmuted" disabled>🎤 Mic On</button>
                <span id="status" class="status disconnected">Disconnected</span>
            </div>
        </div>

        <div class="right-column">
            <div class="events-pane">
                <div class="events-header">
                    Event stream
                </div>
                <div id="eventsContent" class="events-content">
                    <!-- Events will appear here -->
                </div>
            </div>

            <div class="tools-pane">
                <div class="tools-header">
                    Tools & Handoffs
                </div>
                <div id="toolsContent" class="tools-content">
                    <!-- Tools and handoffs will appear here -->
                </div>
            </div>
        </div>

        <div class="json-pane">
            <div class="json-header">
                <span>Payload</span>
                <button id="resetBtn" class="reset-btn">Reset</button>
            </div>
            <div class="json-content">
                <textarea id="jsonEditor" class="json-editor" placeholder="Enter JSON here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // Load the shared sample payload and override the product for voice.
        (function () {
            const editor = document.getElementById('jsonEditor');
            const agentSelect = document.getElementById('agentSelect');
            // Served by voice_ui/app/ui.py (mounted under /voice-ui)
            // Try absolute and relative URLs so it works whether served at /voice-ui or /.
            const urlParams = new URLSearchParams(window.location.search);
            const flavorParam = urlParams.get('flavor');
            const flavorQuery = flavorParam ? `?flavor=${encodeURIComponent(flavorParam)}` : '';
            const examplePaths = [`/voice-ui/example_payload${flavorQuery}`, `/example_payload${flavorQuery}`];

            const generateUUID = () =>
                'xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'.replace(/x/g, () =>
                    Math.floor(Math.random() * 16).toString(16),
                );

            const sessionIdDisplay = document.getElementById('sessionIdDisplay');

            async function loadExamplePayload() {
                if (!editor) return;
                let lastError = null;
                for (const path of examplePaths) {
                    try {
                        const resp = await fetch(path);
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const payload = await resp.json();
                        payload.product = 'resident_one_voice';
                        payload.chat_session_id = generateUUID();
                        if (agentSelect) agentSelect.value = 'resident_one_voice';
                        editor.value = JSON.stringify(payload, null, 2);
                        if (sessionIdDisplay) sessionIdDisplay.textContent = payload.chat_session_id;
                        return;
                    } catch (err) {
                        lastError = err;
                        continue;
                    }
                }
                console.warn('Unable to load example payload; leaving editor empty.', lastError);
                if (editor) {
                    editor.value = '// Failed to load sample payload. See console for details.';
                }
            }

            document.addEventListener('DOMContentLoaded', loadExamplePayload);
        })();
    </script>
    <script src="static/app.js?v=5"></script>
</body>
</html>
