unauthorized_promises_guardrail:
  en: "I'm not authorized to make that commitment. Let me connect you with someone who can help with that request."
  es: "No estoy autorizado para hacer ese compromiso. Permítame conectarle con alguien que pueda ayudar con esa solicitud."
  fr: "Je ne suis pas autorisé à prendre cet engagement. Permettez-moi de vous mettre en relation avec quelqu'un qui pourra vous aider avec cette demande."
  de: "Ich bin nicht befugt, diese Zusage zu machen. Lassen Sie mich Sie mit jemandem verbinden, der Ihnen mit dieser Anfrage helfen kann."
  pt: "Não estou autorizado a fazer esse compromisso. Permita-me conectá-lo com alguém que possa ajudar com essa solicitação."
  it: "Non sono autorizzato a prendere questo impegno. Mi permetta di metterla in contatto con qualcuno che possa aiutarla con questa richiesta."
  ar: "لست مخولاً بتقديم هذا الالتزام. اسمح لي بتوصيلك بشخص يمكنه المساعدة في هذا الطلب."
  zh: "我无权做出该承诺。让我为您转接给可以处理该请求的同事。"
  ja: "そのお約束をする権限がありません。そちらのご要望にお応えできる担当者におつなぎいたします。"
